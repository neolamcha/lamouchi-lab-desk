<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lamouchi Lab Desk</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div class="scanline-overlay"></div>

  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="brand">
          <div class="brand-icon">◈</div>
          <div class="brand-text">
            <h1>LAMOUCHI LAB</h1>
            <span class="brand-sub">DESK · CHEF-D'OEUVRE</span>
          </div>
        </div>
        <div class="header-status">
          <div class="status-item">
            <span class="status-dot live" id="connection-status"></span>
            <span class="status-label">SYNC</span>
          </div>
          <div class="status-item">
            <span id="clock" class="clock">--:--:--</span>
          </div>
        </div>
      </div>
      <div class="header-controls">
        <div class="control-group">
          <label class="ctrl-label">INSTRUMENT</label>
          <select id="instrument-select" class="ctrl-select">
            <option value="MNQ">MNQ / NASDAQ</option>
            <option value="BTCM">BTCM / BITCOIN</option>
            <option value="GCM">GCM / GOLD</option>
          </select>
        </div>
        <form id="config-form" data-instrument="MNQ" class="config-form">
          <div class="control-group">
            <label class="ctrl-label">WEBHOOK</label>
            <input type="url" name="webhookUrl" class="ctrl-input" placeholder="https://..." style="min-width:160px" />
          </div>
          <div class="control-group">
            <label class="ctrl-label">SL MULT (ATR)</label>
            <input type="number" name="atrMultiplierSL" class="ctrl-input" min="0.5" max="5" step="0.1" value="1.5" style="min-width:70px" />
          </div>
          <div class="control-group">
            <label class="ctrl-label">TP MULT (ATR)</label>
            <input type="number" name="atrMultiplierTP" class="ctrl-input" min="1" max="10" step="0.1" value="3.0" style="min-width:70px" />
          </div>
          <div class="control-group">
            <label class="ctrl-label">MODE</label>
            <select name="mode" class="ctrl-select">
              <option value="simulation" selected>AUTO (TA)</option>
              <option value="manual">MANUEL</option>
            </select>
          </div>
          <div class="control-group">
            <label class="ctrl-label">OFFSET</label>
            <input type="number" step="0.01" name="calibrationOffset" class="ctrl-input" placeholder="0" style="min-width:70px" />
          </div>
          <button type="submit" class="ctrl-btn">APPLIQUER</button>
        </form>
        <button id="telegram-toggle-btn" class="ctrl-btn email-btn" style="background:linear-gradient(135deg,rgba(0,136,204,0.1),rgba(0,136,204,0.05));border-color:rgba(0,136,204,0.3);color:#0088cc;">⚙ TELEGRAM</button>
      </div>
    </header>

    <div id="telegram-panel" class="email-panel" style="display:none;">
      <form id="telegram-form" class="email-form">
        <div class="control-group">
          <label class="ctrl-label">ACTIVER LES ALERTES</label>
          <select name="telegramEnabled" class="ctrl-select">
            <option value="false">DÉSACTIVÉ</option>
            <option value="true">ACTIVÉ</option>
          </select>
        </div>
        <div class="control-group">
          <label class="ctrl-label">BOT TOKEN</label>
          <input type="text" name="botToken" class="ctrl-input" placeholder="123456:ABCdef..." style="min-width:250px" />
        </div>
        <div class="control-group">
          <label class="ctrl-label">CHAT ID</label>
          <input type="text" name="chatId" class="ctrl-input" placeholder="-1001234567890" style="min-width:150px" />
        </div>
        <p style="color:#6b7280;font-size:11px;margin:4px 0;">
          1. Créez un bot via @BotFather sur Telegram → obtenez le token<br/>
          2. Démarrez votre bot avec /start<br/>
          3. Obtenez votre Chat ID via @userinfobot
        </p>
        <button type="submit" class="ctrl-btn" style="background:linear-gradient(135deg,rgba(0,136,204,0.15),rgba(0,136,204,0.15));border-color:rgba(0,136,204,0.4);color:#0088cc;">SAUVEGARDER</button>
        <button id="test-telegram-btn" type="button" class="ctrl-btn" style="color:var(--text-muted);border-color:rgba(255,255,255,0.1);">TESTER L'ENVOI</button>
      </form>
      <div id="telegram-status" class="email-status"></div>
    </div>

    <section class="grid-dashboard" id="dashboard">
      <!-- Cards are generated by JS -->
    </section>

    <footer class="footer">
      <span class="footer-left">◈ LAMOUCHI LAB DESK</span>
      <span class="footer-right">INVESTING.COM + TOPSTEP + FEAR &amp; GREED + COINGECKO · ATR SL/TP · CONFLUENCE</span>
    </footer>
  </div>

  <div id="signal-notification" class="signal-notification"></div>
  <script src="app.js"></script>
</body>
</html>
